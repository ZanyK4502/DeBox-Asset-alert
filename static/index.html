<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>DeBox Asset Alert</title>
    <link rel="icon" href="/static/jiankong2.png" type="image/png" />
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <header class="app-header">
      <div class="brand">
        <img src="/static/jiankong2.png" alt="" />
        <div>
          <strong>DeBox Asset Alert</strong>
          <span>链上资产监控</span>
        </div>
      </div>
      <button id="connectWalletBtn" class="primary" type="button">连接钱包</button>
    </header>

    <main class="layout">
      <section class="overview" aria-label="账户概览">
        <div class="intro">
          <p class="eyebrow">Asset Monitor</p>
          <h1>钱包和代币变化，通过 DeBox Bot 实时通知。</h1>
        </div>
        <div id="profileBox" class="status-box muted">尚未连接钱包</div>
        <div id="subscriptionBox" class="status-box muted">连接钱包后查看订阅状态</div>
      </section>

      <section id="renew" class="section">
        <div class="section-head">
          <div>
            <p class="eyebrow">Plans</p>
            <h2>订阅方案</h2>
          </div>
          <button id="freeTrialBtn" class="secondary" type="button">免费体验</button>
        </div>
        <div id="plansGrid" class="plans"></div>
        <div class="action-line">
          <button id="payBtn" class="primary" type="button">支付 / 续费</button>
          <span id="paymentStatus" class="muted"></span>
        </div>
      </section>

      <section id="rules" class="section">
        <div class="section-head">
          <div>
            <p class="eyebrow">Rules</p>
            <h2>监控规则</h2>
          </div>
          <button id="refreshRulesBtn" class="secondary" type="button">刷新</button>
        </div>

        <form id="ruleForm" class="form-grid">
          <label>
            钱包地址
            <input id="walletAddressInput" placeholder="0x..." autocomplete="off" />
          </label>
          <label>
            链
            <select id="chainSelect"></select>
          </label>
          <label>
            规则类型
            <select id="ruleTypeSelect"></select>
          </label>
          <label>
            代币合约
            <input id="tokenAddressInput" placeholder="可选，留空监控原生资产" autocomplete="off" />
          </label>
          <label id="targetAddressWrap">
            目标地址 / 合约
            <input id="targetAddressInput" placeholder="授权对象或交互目标地址" autocomplete="off" />
          </label>
          <label id="targetLabelWrap">
            目标备注
            <input id="targetLabelInput" placeholder="例如交易所、合约名" autocomplete="off" />
          </label>
          <label>
            阈值
            <input id="thresholdInput" type="number" min="0" step="0.000001" value="0" />
          </label>
          <label>
            通知方式
            <select id="targetTypeSelect">
              <option value="private">私聊通知</option>
              <option value="group">群通知</option>
            </select>
          </label>
          <label id="groupTargetWrap">
            通知群
            <select id="groupTargetSelect"></select>
          </label>
          <div id="tokenInfoBox" class="notice muted">填写代币合约后可识别 Token 信息。</div>
          <div id="balanceBox" class="notice muted">还没有查询余额。</div>
          <div class="form-actions">
            <button id="queryBalanceBtn" class="secondary" type="button">查询余额</button>
            <button class="primary" type="submit">创建规则</button>
          </div>
        </form>

        <div id="rulesList" class="list"></div>
      </section>

      <section id="summary" class="section">
        <div class="section-head">
          <div>
            <p class="eyebrow">Digest</p>
            <h2>每日摘要</h2>
          </div>
          <span id="summaryCapability" class="badge muted">未连接</span>
        </div>
        <form id="summaryForm" class="form-grid summary-grid">
          <label class="switch-line">
            <input id="summaryEnabledInput" type="checkbox" />
            开启每日摘要
          </label>
          <label>
            推送时间
            <input id="summaryTimeInput" type="time" value="20:00" />
          </label>
          <label>
            时区
            <input id="summaryTimezoneInput" value="Asia/Shanghai" autocomplete="off" />
          </label>
          <label>
            推送对象
            <select id="summaryTargetSelect">
              <option value="private">本人私聊</option>
              <option value="group">已绑定群</option>
            </select>
          </label>
          <label id="summaryGroupWrap">
            摘要群
            <select id="summaryGroupSelect"></select>
          </label>
          <label>
            备注
            <input id="summaryLabelInput" placeholder="例如晚间摘要" autocomplete="off" />
          </label>
          <div class="form-actions">
            <button class="primary" type="submit">保存摘要设置</button>
          </div>
        </form>
      </section>

      <section id="groups" class="section">
        <div class="section-head">
          <div>
            <p class="eyebrow">Groups</p>
            <h2>群通知</h2>
          </div>
          <span class="badge">专业版</span>
        </div>
        <form id="groupForm" class="form-grid group-grid">
          <label>
            DeBox 群 ID
            <input id="groupIdInput" placeholder="例如 8c6yo6hf" autocomplete="off" />
          </label>
          <label>
            群备注
            <input id="groupLabelInput" placeholder="例如 Alpha 群" autocomplete="off" />
          </label>
          <div class="form-actions">
            <button class="primary" type="submit">绑定群通知</button>
          </div>
        </form>
        <div id="groupsList" class="list"></div>
      </section>
    </main>

    <div id="identityModal" class="modal-backdrop" hidden>
      <div class="modal" role="dialog" aria-modal="true" aria-labelledby="identityModalTitle">
        <h3 id="identityModalTitle">未识别到 DeBox 账号</h3>
        <p>请在 DeBox App 内打开本页面后重新连接，或使用已绑定 DeBox 账号的钱包进行连接。</p>
        <button id="identityModalClose" class="primary" type="button">我知道了</button>
      </div>
    </div>
    <div id="toast" class="toast" hidden></div>
    <script src="/static/app.js"></script>
  </body>
</html>
