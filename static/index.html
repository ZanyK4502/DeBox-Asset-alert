<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>DeBox Asset Alert</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div>
        <strong>DeBox Asset Alert</strong>
        <span>链上资产订阅通知</span>
      </div>
    </header>

    <main class="shell">
      <section class="hero">
        <p class="eyebrow">Multi-chain Asset Monitor</p>
        <h1>创建资产监控，变化时通过 DeBox Bot 通知</h1>
        <p class="lead">连接钱包后创建地址或代币监控规则。订阅生效后，后端会持续检查链上余额变化，并通过 DeBox Bot 推送通知。</p>
        <div class="hero-actions">
          <button id="connectWalletBtn" class="primary">连接 DeBox 钱包</button>
          <a class="secondary" href="#rules">创建监控</a>
          <a class="secondary" href="#renew">订阅续费</a>
        </div>
      </section>

      <section class="grid two">
        <div class="panel">
          <h2>个人账户</h2>
          <div id="profileBox" class="profile muted">尚未连接钱包</div>
        </div>
        <div class="panel">
          <h2>当前订阅</h2>
          <div id="subscriptionBox" class="stack muted">连接钱包后查看订阅状态</div>
        </div>
      </section>

      <section id="renew" class="panel">
        <div class="section-head">
          <div>
            <p class="eyebrow">Plans</p>
            <h2>订阅方案</h2>
          </div>
          <button id="freeTrialBtn" class="ghost">开启免费体验</button>
        </div>
        <div id="plansGrid" class="plans"></div>
        <div class="payment-line">
          <button id="payBtn" class="primary">支付并开通 / 续费</button>
          <span id="paymentStatus" class="muted"></span>
        </div>
      </section>

      <section id="rules" class="panel">
        <div class="section-head">
          <div>
            <p class="eyebrow">Watch Rules</p>
            <h2>创建监控规则</h2>
          </div>
          <button id="refreshRulesBtn" class="ghost">刷新</button>
        </div>

        <form id="ruleForm" class="form-grid">
          <label>
            网络
            <select id="chainSelect"></select>
          </label>
          <label>
            钱包地址
            <input id="walletAddressInput" placeholder="0x..." autocomplete="off" />
          </label>
          <label>
            代币合约地址（可选）
            <input id="tokenAddressInput" placeholder="留空则监控原生资产" autocomplete="off" />
          </label>
          <label>
            监控类型
            <select id="ruleTypeSelect">
              <option value="balance_change">余额变化</option>
              <option value="incoming">转入</option>
              <option value="outgoing">转出</option>
              <option value="balance_threshold">余额阈值</option>
            </select>
          </label>
          <label>
            金额阈值
            <input id="thresholdInput" type="number" min="0" step="0.000001" value="0" />
          </label>
          <label>
            通知目标
            <select id="targetTypeSelect">
              <option value="private">私聊通知</option>
              <option value="group">群通知（专业版）</option>
            </select>
          </label>
          <label id="groupTargetWrap">
            选择群
            <select id="groupTargetSelect"></select>
          </label>
          <div id="tokenInfoBox" class="info-box muted">输入代币合约后会自动识别代币信息。</div>
          <div class="form-actions">
            <button id="queryBalanceBtn" class="secondary" type="button">查询余额</button>
            <button class="primary" type="submit">创建监控</button>
          </div>
        </form>

        <div id="balanceBox" class="info-box muted">还没有查询余额。</div>
        <div id="rulesList" class="list"></div>
      </section>

      <section id="groups" class="panel">
        <div class="section-head">
          <div>
            <p class="eyebrow">Professional</p>
            <h2>群通知设置</h2>
          </div>
          <span class="badge">专业版最多 3 个群</span>
        </div>
        <form id="groupForm" class="form-grid compact">
          <label>
            DeBox 群 ID
            <input id="groupIdInput" placeholder="例如 8c6yo6hf" autocomplete="off" />
          </label>
          <label>
            群备注
            <input id="groupLabelInput" placeholder="例如 Alpha 群" autocomplete="off" />
          </label>
          <button class="primary" type="submit">绑定群通知</button>
        </form>
        <div id="groupsList" class="list"></div>
      </section>
    </main>

    <div id="toast" class="toast" hidden></div>
    <script src="/static/app.js"></script>
  </body>
</html>
